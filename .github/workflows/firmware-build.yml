name: Build and Release Firmware

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          path: '.'
          esp_idf_version: v5.1.2
          target: esp32s3
          command: |
            idf.py set-target esp32s3
            idf.py build

      - name: Package firmware bundle
        run: |
          mkdir -p release
          cp build/ha_voice_puck.bin release/
          cp build/bootloader/bootloader.bin release/
          cp build/partition_table/partition-table.bin release/
          if [ -f build/flasher_args.json ]; then cp build/flasher_args.json release/; fi
          if [ -f build/flash_args ]; then cp build/flash_args release/; fi
          (cd release && sha256sum * > SHA256SUMS)
          (cd release && zip -r ../ha_voice_puck_firmware.zip .)

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ha_voice_puck-firmware-${{ github.sha }}
          if-no-files-found: warn
          path: |
            ha_voice_puck_firmware.zip
            release/SHA256SUMS

      - name: Create GitHub release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: main-${{ github.run_number }}
          release_name: Firmware build ${{ github.run_number }}
          draft: false
          prerelease: true
          body: |
            Automated firmware build from the main branch.
            - Commit: ${{ github.sha }}
            - Run: ${{ github.run_number }}

      - name: Upload release asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ha_voice_puck_firmware.zip
          asset_name: ha_voice_puck_firmware-${{ github.run_number }}.zip
          asset_content_type: application/zip
